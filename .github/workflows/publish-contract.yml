name: Publish Auth Package

on:
  push:
    paths:
      - 'packages/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@57eme-regiment'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Détection ─────────────────────────────────────────────────────────
      - name: Detect changed packages
        id: changes
        uses: ./.github/actions/detect-changes
        with:
          base-sha: ${{ github.event.before }}
          head-sha: ${{ github.sha }}

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build changed packages
        uses: ./.github/actions/build-packages
        with:
          auth-package: ${{ steps.changes.outputs.auth-package }}

      # ── Publish stable (main) ─────────────────────────────────────────────
      - name: Publish auth-package (latest)
        id: pub-package
        if: github.ref == 'refs/heads/main' && steps.changes.outputs.auth-package == 'true'
        uses: ./.github/actions/publish-package
        with:
          package:         auth-package
          tag:             latest
          node-auth-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bumps
        if: github.ref == 'refs/heads/main' && steps.pub-package.outputs.bumped == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: bump packages minor version [skip ci]"
          git push

      # ── Publish beta (autres branches) ────────────────────────────────────
      - name: Publish auth-package (beta)
        if: github.ref != 'refs/heads/main' && steps.changes.outputs.auth-package == 'true'
        uses: ./.github/actions/publish-package
        with:
          package:         auth-package
          tag:             beta
          run-number:      ${{ github.run_number }}
          node-auth-token: ${{ secrets.GITHUB_TOKEN }}
