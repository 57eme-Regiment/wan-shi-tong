name: Detect Changed Packages
description: Détecte quels packages ont des fichiers modifiés entre deux commits.

inputs:
  base-sha:
    description: SHA du commit de base
    required: true
  head-sha:
    description: SHA du commit HEAD
    required: true

outputs:
  auth-package:
    description: true si auth-package a changé
    value: ${{ steps.detect.outputs.auth-package }}

runs:
  using: composite
  steps:
    - id: detect
      shell: bash
      run: |
        BASE="${{ inputs.base-sha }}"

        # Premier push : pas de commit précédent
        if [ "$BASE" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE" ]; then
          BASE=$(git rev-list --max-parents=0 HEAD)
        fi

        for PKG in auth-package; do
          if git diff --name-only "$BASE" "${{ inputs.head-sha }}" -- "packages/$PKG/" | grep -q .; then
            echo "$PKG=true" >> $GITHUB_OUTPUT
            echo "✓ [$PKG] changements détectés"
          else
            echo "$PKG=false" >> $GITHUB_OUTPUT
            echo "– [$PKG] pas de changements"
          fi
        done
